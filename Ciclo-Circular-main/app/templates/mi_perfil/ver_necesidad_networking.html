{% extends 'base_public.html' %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 pt-6 pb-12">
    <div class="bg-white dark:bg-[#1e293b] rounded-2xl shadow border border-slate-200 dark:border-slate-700 p-8">
        
        <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-100 dark:border-slate-700">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-amber-100 flex items-center justify-center text-amber-600">
                    <i class="fa-solid fa-hand-sparkles"></i>
                </div>
                <h2 class="text-xl font-bold text-slate-900 dark:text-white">Detalle Necesidad</h2>
            </div>
            <a href="{% url 'pagina_networking' %}" class="flex items-center gap-2 px-4 py-2 rounded-xl border border-slate-300 dark:border-slate-600 text-sm font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-100 transition">
                <i class="fa-solid fa-arrow-left"></i> Volver
            </a>
        </div>

        <div class="space-y-6">
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Descripción</p>
                <p class="text-slate-700 dark:text-slate-300 text-sm leading-relaxed">{{ necesidad.texto_necesita }}</p>
            </div>

            {% if palabras %}
            <div class="p-4 bg-amber-50 dark:bg-amber-900/20 rounded-xl border border-amber-100">
                <p class="text-[10px] font-bold text-amber-600 uppercase tracking-widest mb-2">
                    <i class="fa-solid fa-robot mr-1"></i> Palabras Clave IA
                </p>
                <div class="flex flex-wrap gap-2">
                    {% for palabra in palabras %}
                    <span class="px-3 py-1 bg-white text-amber-700 rounded-full text-xs font-bold border border-amber-200">{{ palabra }}</span>
                    {% endfor %}
                </div>
            </div>
            {% endif %}

            <div class="flex items-center justify-between pt-4 border-t border-slate-100 dark:border-slate-700">
                <span class="text-xs text-slate-400">{{ necesidad.creado|date:"d M Y H:i" }}</span>
                <a href="{% url 'editar_networking_necesidad' necesidad.pk %}" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-amber-500 hover:bg-amber-600 text-white text-sm font-bold transition">
                    <i class="fa-solid fa-pen"></i> Editar
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
