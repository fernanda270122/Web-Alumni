{% load static %}
<!DOCTYPE HTML>
<html lang="es">

<head>
    <title>Plataforma Networking</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">

    <link rel="stylesheet" href="{% static 'css/main.css' %}" />
    <noscript>
        <link rel="stylesheet" href="{% static 'css/noscript.css' %}" />
    </noscript>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="is-preload">

    <div id="wrapper">
        <div class="container-sm" style="margin-bottom: auto;">

            <!-- Barra superior -->
            <div class="d-flex justify-content-between align-items-center mb-3 mt-3">
                <a id="home_admin" href="{% url 'mi_perfil' %}">Volver</a>
                <a href="{% url 'logout' %}" id="cerrarSesion">Cerrar sesión</a>
            </div>

            <div class="container mt-4">

                <h2 class="titulo-seccion mb-4">INGRESA TU CV</h2>

                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <label class="fw-bold">Seleccionar archivo:</label>

                    <div class="d-flex gap-2 mb-3">
                        <!-- Input a la izquierda -->
                        <input id="archivoInput" type="file" name="archivo" class="form-control" required style="border-radius:60px;">

                        <!-- Botón limpiar a la derecha -->
                        <button type="button" class="btn btn-secondary px-3" onclick="limpiarArchivo()" style="border-radius:60px;">
                            LIMPIAR
                        </button>
                    </div>

                    <div>
                        <button class="btn btn-success px-4 py-2" style="border-radius:60px;">
                            SUBIR CV
                        </button>
                    </div>

                    <script>
                        function limpiarArchivo() {
                            document.getElementById("archivoInput").value = "";
                        }
                    </script>

                    <script src="{% static 'js/jquery.min.js' %}"></script>
                    <script src="{% static 'js/browser.min.js' %}"></script>
                    <script src="{% static 'js/breakpoints.min.js' %}"></script>
                    <script src="{% static 'js/util.js' %}"></script>
                    <script src="{% static 'js/main.js' %}"></script>

</body>

</html>
