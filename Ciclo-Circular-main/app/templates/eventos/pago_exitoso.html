{% extends 'base_public.html' %}
{% load static %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh] px-4">
    <div class="bg-white dark:bg-[#1e293b] p-8 md:p-12 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-700 max-w-md w-full text-center transform transition-all">
        
        <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-emerald-100 dark:bg-emerald-900/30 mb-6">
            <i class="fa-solid fa-circle-check text-5xl text-emerald-600 dark:text-emerald-400"></i>
        </div>
        
        <h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2 tracking-tight">¡Pago Exitoso!</h2>
        <p class="text-slate-600 dark:text-slate-400 mb-8 text-sm leading-relaxed">
            Tu pago ha sido procesado correctamente. Tu entrada al evento ha sido confirmada y ya está disponible en tu panel.
        </p>
        
        <div class="flex flex-col gap-3">
            <a href="{% url 'mis_invitaciones' %}" class="w-full inline-flex justify-center items-center px-6 py-3 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold shadow-lg shadow-emerald-600/30 transition-all transform hover:-translate-y-0.5">
                Ver mis entradas
            </a>
            
            <a href="{% url 'ver_calendario' %}?refresh=true" class="w-full inline-flex justify-center items-center px-6 py-3 rounded-xl bg-slate-100 dark:bg-white/5 text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-white/10 text-sm font-bold transition-colors border border-transparent dark:border-slate-700">
                Volver al Calendario
            </a>
        </div>
    </div>
</div>
{% endblock %}
