{% extends 'base_public.html' %}
{% block content %}
<div class="max-w-xl mx-auto text-center space-y-6 py-16">
    <div class="w-20 h-20 bg-emerald-100 dark:bg-emerald-900/30 rounded-full flex items-center justify-center mx-auto">
        <i class="fa-solid fa-check text-emerald-600 text-4xl"></i>
    </div>
    <h2 class="text-2xl font-bold text-slate-900 dark:text-white">¡Gracias por responder!</h2>
    <p class="text-slate-500">Tu respuesta a la encuesta <strong>{{ encuesta.titulo }}</strong> ha sido registrada exitosamente.</p>
    <a href="{% url 'home' %}" class="inline-flex items-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition">
        <i class="fa-solid fa-house"></i> Volver al Inicio
    </a>
</div>
{% endblock %}
