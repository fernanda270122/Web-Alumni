{% load static %}
<!DOCTYPE HTML>
<html lang="es">

<head>
    <title>Plataforma Networking</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos del sistema -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}" />
    <noscript>
        <link rel="stylesheet" href="{% static 'css/noscript.css' %}" />
    </noscript>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="is-preload">

    <div id="wrapper">

        <div class="container-sm" style="margin-bottom: auto;">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <a id="home_admin" href="{% url 'home' %}">Volver al Inicio</a>
                <a href="{% url 'logout' %}" id="cerrarSesion">Cerrar sesión</a>
            </div>

            <h2 class="titulo-seccion text-center my-4">NOTIFICACIONES</h2>

            <div class="d-flex flex-column align-items-center" style="margin-top: 80px;">

                <a href="{% url 'notificaciones' %}" class="btn btn-dark mb-3 w-50" style="border-radius: 60px;">
                    Notificaciones a usuarios
                </a>

                <a href="{% url 'notificaciones_comuna' %}" class="btn btn-dark mb-3 w-50" style="border-radius: 60px;">
                    Notificaciones por comuna
                </a>

            </div>

        </div>

    </div>

    <div id="bg"></div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/jquery.min.js' %}"></script>
    <script src="{% static 'js/browser.min.js' %}"></script>
    <script src="{% static 'js/breakpoints.min.js' %}"></script>
    <script src="{% static 'js/util.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>

</body>

</html>
