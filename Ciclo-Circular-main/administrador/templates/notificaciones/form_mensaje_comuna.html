{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Plataforma Networking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>

<body class="is-preload">

    <div class="container mt-5" style="max-width: 700px;">

        <h2 class="text-center mb-4">Enviar mensaje a la comuna {{ comuna }}</h2>

        <form method="POST" enctype="multipart/form-data" action="{% url 'enviar_mensaje_comuna' comuna %}"
            onsubmit="return confirmarEnvio()">
            {% csrf_token %}

            <label class="fw-bold">Mensaje:</label>
            <textarea name="mensaje" class="form-control" rows="7" required></textarea>

            <br>

            <label class="fw-bold" >Adjuntar archivo (opcional):</label>
            <div class="input-group">
                <input type="file" name="archivo" id="archivoInput" class="form-control">
                <button type="button" class="btn btn-outline-danger" onclick="archivoInput.value=''" style="border-radius: 60px;">Limpiar</button>
            </div>

            <br>

            <div class="d-flex justify-content-between mt-4">
                <button type="submit" class="btn btn-success w-50" style="border-radius: 60px;">Enviar</button>

                <a href="{% url 'notificaciones_comuna' %}" class="btn btn-secondary w-50 ms-2" style="border-radius: 60px;">Cancelar</a>
            </div>

        </form>

    </div>

    <script>
        function confirmarEnvio() {
            return confirm("¿Enviar mensaje a TODOS los usuarios de esta comuna?") &&
                confirm("Confirmación final: ¿Seguro?");
        }
    </script>

</body>

</html>
