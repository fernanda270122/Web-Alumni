{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Plataforma Networking</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>

<body class="is-preload">

    <div class="container mt-5" style="max-width: 700px;">

        <h2 class="text-center mb-4">Enviar mensaje a todos los usuarios</h2>

        <form method="POST" enctype="multipart/form-data" action="{% url 'enviar_mensaje_todos' id_empresa %}">
            {% csrf_token %}

            <label class="fw-bold">Mensaje:</label>
            <textarea name="mensaje" class="form-control" rows="7" required></textarea>

            <br>

            <label class="fw-bold">Adjuntar archivo (opcional):</label>

            <div class="input-group">
                <input type="file" name="archivo" id="archivoInput" class="form-control">
                <button type="button" class="btn btn-outline-danger" onclick="limpiarArchivo()" style="border-radius: 60px;">
                    Limpiar
                </button>
            </div>

            <br>

            <div class="d-flex justify-content-between mt-4">

                <!-- Enviar con doble confirmación -->
                <button type="submit" class="btn btn-success w-50 ms-2" onclick="return confirmarEnvio();" style="margin-right: 10px;">
                    Enviar mensaje
                </button>

                <a href="/administrador/notificaciones/?empresa={{ id_empresa }}" 
                   class="btn btn-secondary w-50 me-2" style="margin-left: 10px; border-radius: 60px;">
                    Cancelar
                </a>
            </div>
        </form>

    </div>

    <script>
        function limpiarArchivo() {
            document.getElementById("archivoInput").value = "";
        }

        function confirmarEnvio() {
            return confirm("¿Estás seguro de enviar el mensaje a TODOS los usuarios?") &&
                   confirm("Confirmación final: ¿Deseas enviar el mensaje?");
        }
    </script>

</body>
</html>
