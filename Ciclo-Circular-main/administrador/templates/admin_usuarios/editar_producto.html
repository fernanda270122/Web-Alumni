{% extends 'base_admin.html' %}
{% block content %}
<div class="max-w-2xl mx-auto space-y-6">
    <div class="flex justify-between items-center pb-4 border-b border-slate-200 dark:border-slate-800">
        <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Editar Producto</h2>
        <a href="{% url 'gestion_tienda' %}" class="flex items-center gap-2 px-4 py-2 rounded-xl border border-slate-300 text-sm font-bold text-slate-600 hover:bg-slate-100 transition">
            <i class="fa-solid fa-arrow-left"></i> Volver
        </a>
    </div>

    <div class="bg-white dark:bg-[#1e293b] rounded-2xl shadow border border-slate-200 dark:border-slate-700 p-8">
        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Nombre *</label>
                <input type="text" name="nombre" value="{{ producto.nombre }}" required class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Descripción</label>
                <textarea name="descripcion" rows="3" class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none resize-none transition">{{ producto.descripcion }}</textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Precio *</label>
                    <input type="number" name="precio" value="{{ producto.precio }}" required min="0" class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Stock *</label>
                    <input type="number" name="stock" value="{{ producto.stock }}" required min="0" class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Imagen</label>
                {% if producto.imagen %}
                <img src="{{ producto.imagen.url }}" class="w-24 h-24 rounded-xl object-cover mb-3">
                {% endif %}
                <input type="file" name="imagen" accept="image/*" class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div class="flex items-center gap-3">
                <input type="checkbox" name="activo" id="activo" {% if producto.activo %}checked{% endif %} class="w-4 h-4 rounded">
                <label for="activo" class="text-sm font-medium text-slate-700 dark:text-slate-300">Producto activo</label>
            </div>
            <button type="submit" class="w-full py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-bold transition shadow-md">
                <i class="fa-solid fa-floppy-disk mr-2"></i> Guardar Cambios
            </button>
        </form>
    </div>
</div>
{% endblock %}
