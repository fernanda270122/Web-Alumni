{% extends 'base_admin.html' %}
{% load static %}

{% block sidebar %}{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-8">

    <div class="flex flex-col md:flex-row justify-between items-center gap-4 border-b border-slate-200 dark:border-slate-800 pb-6">
        <div>
            <h2 class="text-2xl font-bold text-slate-900 dark:text-white tracking-tight">Editar Usuario</h2>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">
                Modificando perfil de <span class="text-primary font-bold">@{{ usuario.username }}</span>
            </p>
        </div>
        
        <a href="{% url 'admin_usuarios' %}?universidad={{ universidad_id }}" class="flex items-center gap-2 px-5 py-2.5 bg-slate-800 dark:bg-white text-white dark:text-slate-900 rounded-lg text-sm font-bold shadow-md hover:opacity-90 transition">
            <i class="fa-solid fa-arrow-left"></i> Volver a la Lista
        </a>
    </div>

    <div class="bg-white dark:bg-[#1e293b] rounded-2xl shadow-lg border border-slate-200 dark:border-slate-700 p-8">
        
        <form method="POST" id="formEditarUsuario" class="space-y-6" onsubmit="habilitarSelects()">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Nombre</label>
                    <input type="text" name="nombre" value="{{ usuario.first_name }}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-white focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Apellido</label>
                    <input type="text" name="apellido" value="{{ usuario.last_name }}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-white focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Email</label>
                    <input type="email" name="email" value="{{ usuario.email }}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-white focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Teléfono</label>
                    <input type="text" name="telefono" value="{{ usuario.telefono|default:'' }}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-white focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition">
                </div>

                <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 pt-4 border-t border-slate-100 dark:border-slate-700">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">F. Nacimiento</label>
                        <input type="date" name="fecha_nacimiento" value="{{ usuario.fecha_nacimiento|date:'Y-m-d' }}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-white focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Género</label>
                        <div class="relative">
                            <select name="genero" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-white focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition appearance-none cursor-pointer">
                                <option value="" {% if not usuario.genero %}selected{% endif %}>-- Seleccionar --</option>
                                <option value="M" {% if usuario.genero == 'M' %}selected{% endif %}>Masculino</option>
                                <option value="F" {% if usuario.genero == 'F' %}selected{% endif %}>Femenino</option>
                                <option value="O" {% if usuario.genero == 'O' %}selected{% endif %}>Otro</option>
                                <option value="N" {% if usuario.genero == 'N' %}selected{% endif %}>Prefiero no decir</option>
                            </select>
                            <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-slate-500">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Región</label>
                        <div class="relative">
                            <select name="region" id="select_region" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-white focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition appearance-none cursor-pointer">
                                <option value="" disabled {% if not usuario.region %}selected{% endif %}>Seleccione...</option>
                                <option value="Arica y Parinacota" {% if usuario.region == 'Arica y Parinacota' %}selected{% endif %}>Arica y Parinacota</option>
                                <option value="Tarapacá" {% if usuario.region == 'Tarapacá' %}selected{% endif %}>Tarapacá</option>
                                <option value="Antofagasta" {% if usuario.region == 'Antofagasta' %}selected{% endif %}>Antofagasta</option>
                                <option value="Atacama" {% if usuario.region == 'Atacama' %}selected{% endif %}>Atacama</option>
                                <option value="Coquimbo" {% if usuario.region == 'Coquimbo' %}selected{% endif %}>Coquimbo</option>
                                <option value="Valparaíso" {% if usuario.region == 'Valparaíso' %}selected{% endif %}>Valparaíso</option>
                                <option value="Metropolitana" {% if usuario.region == 'Metropolitana' %}selected{% endif %}>Metropolitana</option>
                                <option value="O'Higgins" {% if usuario.region == "O'Higgins" %}selected{% endif %}>O'Higgins</option>
                                <option value="Maule" {% if usuario.region == 'Maule' %}selected{% endif %}>Maule</option>
                                <option value="Ñuble" {% if usuario.region == 'Ñuble' %}selected{% endif %}>Ñuble</option>
                                <option value="Biobío" {% if usuario.region == 'Biobío' %}selected{% endif %}>Biobío</option>
                                <option value="Araucanía" {% if usuario.region == 'Araucanía' %}selected{% endif %}>Araucanía</option>
                                <option value="Los Ríos" {% if usuario.region == 'Los Ríos' %}selected{% endif %}>Los Ríos</option>
                                <option value="Los Lagos" {% if usuario.region == 'Los Lagos' %}selected{% endif %}>Los Lagos</option>
                                <option value="Aysén" {% if usuario.region == 'Aysén' %}selected{% endif %}>Aysén</option>
                                <option value="Magallanes" {% if usuario.region == 'Magallanes' %}selected{% endif %}>Magallanes</option>
                            </select>
                            <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-slate-500">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Comuna</label>
                        <div class="relative">
                            <select name="comuna" id="select_comuna" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-white focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition appearance-none cursor-pointer">
                                {% if usuario.comuna %}
                                    <option value="{{ usuario.comuna }}" selected>{{ usuario.comuna }}</option>
                                {% else %}
                                    <option value="" disabled selected>Esperando Región...</option>
                                {% endif %}
                            </select>
                            <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-slate-500">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="md:col-span-2 pt-4">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Carrera / Área</label>
                    <div class="relative">
                        <select name="carrera" required class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-[#0f172a] text-slate-900 dark:text-white focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition appearance-none cursor-pointer">
                            <option value="" disabled>Seleccione...</option>
                            {% for carrera in carreras %}
                                <option value="{{ carrera.pk }}" {% if carrera_actual_id == carrera.pk %}selected{% endif %}>
                                    {{ carrera.nombre }}
                                </option>
                            {% endfor %}
                        </select>
                        <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none">
                            <i class="fa-solid fa-chevron-down text-slate-400 text-xs"></i>
                        </div>
                    </div>
                    <p class="text-[10px] text-slate-400 mt-2 ml-1 flex items-center gap-1">
                        <i class="fa-solid fa-circle-info text-amber-500"></i> Solo se muestran carreras de la universidad actual.
                    </p>
                </div>
            </div>

            <div class="pt-8 flex items-center justify-end gap-3 border-t border-slate-100 dark:border-slate-700">
                <a href="{% url 'admin_usuarios' %}?universidad={{ universidad_id }}" class="px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-white/5 transition">
                    Cancelar
                </a>
                <button type="submit" class="px-6 py-2.5 rounded-xl bg-amber-500 hover:bg-amber-600 text-white font-bold shadow-lg shadow-amber-500/20 transition transform hover:-translate-y-0.5">
                    <i class="fa-solid fa-save mr-2"></i> Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function habilitarSelects() {
    document.getElementById('select_comuna').disabled = false;
}

(function() {
    const selRegion = document.getElementById('select_region');
    const selComuna = document.getElementById('select_comuna');
    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

    async function fetchData(action, id) {
        const formData = new FormData();
        formData.append('action', action);
        formData.append('id', id);

        const response = await fetch(window.location.href, {
            method: 'POST',
            headers: {
                'X-CSRFToken': csrfToken,
                'X-Requested-With': 'XMLHttpRequest' 
            },
            body: formData
        });
        
        if (!response.ok) throw new Error('Error en la red');
        return response.json(); 
    }

    selRegion.addEventListener('change', async function() {
        const idRegion = this.value; 
        selComuna.innerHTML = '<option>Cargando...</option>';
        selComuna.disabled = true;
        
        try {
            const data = await fetchData('buscar_comunas', idRegion);
            let opts = '<option value="" disabled selected>Seleccione Comuna...</option>';
            if (data.length === 0) { opts = '<option value="" disabled>Sin comunas</option>'; }
            data.forEach(item => { opts += `<option value="${item.nombre}">${item.nombre}</option>`; });
            
            selComuna.innerHTML = opts;
            selComuna.disabled = false;
        } catch (error) {
            console.error("Error:", error);
            selComuna.innerHTML = '<option>Error al cargar</option>';
        }
    });
})();
</script>
{% endblock %}
