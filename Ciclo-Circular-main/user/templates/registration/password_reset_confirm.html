{% load static %}
<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-50 dark:bg-[#020617]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Nueva Contraseña | Red Alumni</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#991b1b', primaryHover: '#7f1d1d' } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="h-full flex flex-col justify-center items-center py-12 sm:px-6 lg:px-8 font-['Inter']">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white dark:bg-[#1e293b] py-8 px-6 shadow-2xl sm:rounded-2xl sm:px-10 border border-slate-100 dark:border-slate-700">
            <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-6 text-center">Crear Nueva Contraseña</h2>
            
            {% if validlink %}
                <form method="POST" class="space-y-4">
                    {% csrf_token %}
                    {% for field in form %}
                        <div>
                            <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-2">{{ field.label }}</label>
                            <input type="password" name="{{ field.html_name }}" required 
                                   class="appearance-none block w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary sm:text-sm transition-all shadow-sm">
                            {% if field.errors %}<p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="w-full py-3.5 px-4 mt-6 rounded-xl shadow-lg shadow-primary/20 text-sm font-bold text-white bg-primary hover:bg-primaryHover transition-all transform hover:-translate-y-0.5">
                        Guardar Contraseña
                    </button>
                </form>
            {% else %}
                <div class="text-center">
                    <i class="fa-solid fa-triangle-exclamation text-4xl text-red-500 mb-4"></i>
                    <p class="text-red-600 font-bold mb-6">El enlace es inválido o ya expiró.</p>
                    <a href="{% url 'password_reset' %}" class="text-primary font-bold hover:underline">Solicitar uno nuevo</a>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
