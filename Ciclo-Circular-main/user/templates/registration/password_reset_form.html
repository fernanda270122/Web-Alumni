{% load static %}
<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-50 dark:bg-[#020617]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | Red Alumni</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#991b1b', primaryHover: '#7f1d1d' } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="h-full flex flex-col justify-center items-center py-12 sm:px-6 lg:px-8 font-['Inter']">

    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center mb-8">
        <div class="mx-auto w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center text-primary text-3xl mb-6">
            <i class="fa-solid fa-key"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Recuperar Acceso</h2>
        <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">Te enviaremos un enlace seguro a tu correo.</p>
    </div>

    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white dark:bg-[#1e293b] py-8 px-6 shadow-2xl shadow-slate-200/50 dark:shadow-none sm:rounded-2xl sm:px-10 border border-slate-100 dark:border-slate-700">
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label for="id_email" class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-2">Correo registrado</label>
                    <input type="email" name="email" id="id_email" required 
                           class="appearance-none block w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary sm:text-sm transition-all shadow-sm"
                           placeholder="tu@correo.com">
                </div>
                <button type="submit" class="w-full flex justify-center py-3.5 px-4 rounded-xl shadow-lg shadow-primary/20 text-sm font-bold text-white bg-primary hover:bg-primaryHover transition-all transform hover:-translate-y-0.5">
                    Enviar enlace de recuperación
                </button>
            </form>
            <div class="mt-6 text-center">
                <a href="{% url 'login' %}" class="text-sm font-bold text-slate-500 hover:text-primary transition"><i class="fa-solid fa-arrow-left mr-1"></i> Volver al Login</a>
            </div>
        </div>
    </div>
</body>
</html>
