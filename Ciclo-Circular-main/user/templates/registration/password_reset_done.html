{% load static %}
<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-50 dark:bg-[#020617]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo Enviado | Red Alumni</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#991b1b', primaryHover: '#7f1d1d' } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="h-full flex flex-col justify-center items-center py-12 sm:px-6 lg:px-8 font-['Inter']">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <div class="mx-auto w-20 h-20 bg-emerald-100 dark:bg-emerald-900/30 rounded-full flex items-center justify-center text-emerald-600 dark:text-emerald-400 text-4xl mb-6 shadow-lg shadow-emerald-500/20">
            <i class="fa-regular fa-paper-plane"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white mb-4">¡Correo Enviado!</h2>
        <p class="text-slate-600 dark:text-slate-400 mb-8 bg-white dark:bg-[#1e293b] p-6 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm">
            Hemos enviado un enlace seguro a tu bandeja de entrada. Haz clic en él para crear una nueva contraseña. Si no lo ves, revisa la carpeta de Spam.
        </p>
        <a href="{% url 'login' %}" class="inline-flex justify-center py-3 px-8 border border-slate-300 dark:border-slate-700 rounded-xl shadow-sm text-sm font-bold text-slate-700 dark:text-slate-300 bg-white dark:bg-[#0f172a] hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
            Volver al inicio
        </a>
    </div>
</body>
</html>
